<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContextBuilder</title>
  <link rel="stylesheet" href="style.css">
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #e0f2fe 100%);
      color: #0c4a6e;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      /* Increased padding for the whole popup */
      box-sizing: border-box;
    }

    /* Layout Spacing (Explicit to prevent clutter) */
    .section-spacer {
      margin-bottom: 24px !important;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      padding: 20px !important;
      /* Increased internal padding */
    }

    .actions-grid {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 16px !important;
      /* Increased gap between buttons */
    }

    /* Colored Buttons */
    .btn-primary-ocean {
      background-color: #0284c7 !important;
      color: white !important;
      border-radius: 12px !important;
      padding: 12px 16px !important;
      /* More padding */
      font-weight: 600 !important;
      font-size: 13px !important;
      border: none !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
      transition: all 0.2s !important;
      box-shadow: 0 4px 6px rgba(2, 132, 199, 0.2) !important;
      cursor: pointer !important;
    }

    .btn-primary-ocean:hover {
      background-color: #0369a1 !important;
      box-shadow: 0 6px 12px rgba(2, 132, 199, 0.3) !important;
    }

    .btn-secondary-teal {
      background-color: #0d9488 !important;
      color: white !important;
      border-radius: 12px !important;
      padding: 12px 16px !important;
      /* More padding */
      font-weight: 600 !important;
      font-size: 13px !important;
      border: none !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
      transition: all 0.2s !important;
      box-shadow: 0 4px 6px rgba(13, 148, 136, 0.2) !important;
      cursor: pointer !important;
    }

    .btn-secondary-teal:hover {
      background-color: #0f766e !important;
      box-shadow: 0 6px 12px rgba(13, 148, 136, 0.3) !important;
    }

    .btn-create {
      background-color: #0c4a6e !important;
      color: white !important;
      border-radius: 12px !important;
      padding: 10px 16px !important;
      border: none !important;
      cursor: pointer !important;
      transition: background-color 0.2s !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .btn-create:hover {
      background-color: #0369a1 !important;
    }

    textarea {
      background: rgba(255, 255, 255, 0.7) !important;
      border: 1px solid rgba(2, 132, 199, 0.1) !important;
      border-radius: 12px !important;
      padding: 16px !important;
      /* More padding */
      color: #0c4a6e !important;
      font-family: inherit !important;
      font-size: 13px !important;
      line-height: 1.6 !important;
      /* Better line height */
      height: 160px !important;
      /* Increased height */
      resize: none !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }

    textarea:focus {
      outline: none !important;
      border-color: #0284c7 !important;
      background: rgba(255, 255, 255, 0.9) !important;
    }

    select {
      border: none !important;
      background: transparent !important;
      font-weight: 700 !important;
      font-size: 16px !important;
      color: #0c4a6e !important;
      cursor: pointer !important;
      outline: none !important;
    }

    input[type="text"] {
      background: rgba(255, 255, 255, 0.9) !important;
      border: 1px solid rgba(2, 132, 199, 0.2) !important;
      border-radius: 12px !important;
      padding: 12px 16px !important;
      /* More padding */
      color: #0c4a6e !important;
      font-size: 13px !important;
      box-sizing: border-box !important;
    }

    input[type="text"]:focus {
      outline: none !important;
      border-color: #0284c7 !important;
    }

    .header-container {
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      margin-bottom: 28px !important;
      /* More space after header */
    }
  </style>
</head>

<body class="w-96 font-sans">
  <!-- Header -->
  <div class="header-container">
    <div style="display: flex; align-items: center; gap: 12px;">
      <img src="icons/icon48.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px;">
      <h1 style="font-size: 20px; font-weight: 700; color: #0c4a6e; margin: 0;">ContextBuilder</h1>
    </div>
    <button id="optionsBtn"
      style="color: #0284c7; background: transparent; border: none; cursor: pointer; padding: 4px;">
      <svg xmlns="http://www.w3.org/2000/svg" style="height: 24px; width: 24px;" viewBox="0 0 20 20"
        fill="currentColor">
        <path fill-rule="evenodd"
          d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.888.161 2.035-.74 2.458-1.563.73-1.563 2.953 0 3.683.901.423 1.28 1.57.74 2.458-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.74-2.458c1.563-.73 1.563-2.953 0-3.683a1.533 1.533 0 01-.74-2.458c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
          clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <!-- Active Context Card -->
  <div class="glass-card section-spacer">
    <label
      style="font-size: 11px; font-weight: 700; color: #b45309; text-transform: uppercase; letter-spacing: 0.05em;">Active
      Context</label>
    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 8px;">
      <select id="contextSelect">
        <option value="default">Default Context</option>
      </select>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="renameContextBtn" style="color: #0284c7; font-weight: 700; font-size: 14px; background: transparent; border: none; cursor: pointer;">Rename</button>
        <button id="deleteContextBtn" style="color: #ef4444; background: transparent; border: none; cursor: pointer; display: flex; align-items: center;" title="Delete Context">
          <svg xmlns="http://www.w3.org/2000/svg" style="height: 18px; width: 18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Actions Grid -->
  <div class="actions-grid section-spacer">
    <button id="copyPageBtn" class="btn-primary-ocean">
      <svg xmlns="http://www.w3.org/2000/svg" style="height: 16px; width: 16px;" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
      <span>Scrape Page</span>
    </button>
    <button id="syncBtn" class="btn-secondary-teal">
      <svg xmlns="http://www.w3.org/2000/svg" style="height: 16px; width: 16px;" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.582m-15.356-2A8.001 8.001 0 0019.418 15m0 0H15" />
      </svg>
      <span>Sync Docs</span>
    </button>
  </div>

  <!-- Preview Area -->
  <div class="glass-card section-spacer" style="padding: 0 !important; overflow: hidden;">
    <div
      style="padding: 12px 16px; border-bottom: 1px solid rgba(2,132,199,0.1); background: rgba(255,255,255,0.5); display: flex; justify-content: space-between; align-items: center;">
      <span
        style="font-size: 11px; font-weight: 700; color: #b45309; text-transform: uppercase; letter-spacing: 0.05em;">Preview</span>
      <span id="charCount" style="font-size: 11px; color: #0c4a6e; opacity: 0.6; font-weight: 700;">0 chars</span>
    </div>
    <textarea id="contextContent"
      placeholder="Add text to this context by highlighting on any page and right-clicking, or type here directly..."></textarea>
  </div>

  <!-- Footer / New Context -->
  <div style="display: flex; align-items: center; gap: 12px;">
    <input id="newContextName" type="text" placeholder="New context name..." style="flex: 1;">
    <button id="createContextBtn" class="btn-create">
      <svg xmlns="http://www.w3.org/2000/svg" style="height: 20px; width: 20px;" viewBox="0 0 20 20"
        fill="currentColor">
        <path fill-rule="evenodd"
          d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
          clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
